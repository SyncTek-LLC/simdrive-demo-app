name: simdrive-demo-app
options:
  bundleIdPrefix: io.synctek.simdrive
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
targets:
  simdrive-demo-app:
    type: application
    platform: iOS
    sources:
      - path: simdrive-demo-app
    info:
      path: simdrive-demo-app/Info.plist
      properties:
        CFBundleDisplayName: SimDrive Demo
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.synctek.simdrive.demo
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  simdrive-demo-appTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: simdrive-demo-appTests
    dependencies:
      - target: simdrive-demo-app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.synctek.simdrive.demo.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/simdrive-demo-app.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/simdrive-demo-app"
  simdrive-demo-appUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: simdrive-demo-appUITests
    dependencies:
      - target: simdrive-demo-app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.synctek.simdrive.demo.uitests
        TEST_TARGET_NAME: simdrive-demo-app
schemes:
  simdrive-demo-app:
    build:
      targets:
        simdrive-demo-app: all
        simdrive-demo-appTests: [test]
        simdrive-demo-appUITests: [test]
    test:
      targets:
        - simdrive-demo-appTests
        - simdrive-demo-appUITests
    run:
      config: Debug
